<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ProTech Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #080808;
            color: #ffffff;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        .gold-glow {
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .gold-border {
            border: 1px solid rgba(212, 175, 55, 0.5);
        }

        .text-gold {
            color: #D4AF37;
        }

        .glass-card {
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: #D4AF37;
            opacity: 0.6;
        }

        .glass-card:hover {
            border-color: rgba(212, 175, 55, 0.6);
            box-shadow: 0 10px 30px -10px rgba(212, 175, 55, 0.2);
        }

        .btn-primary {
            background-color: #D4AF37;
            color: #000;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .btn-outline-gold {
            border: 1px solid #D4AF37;
            color: #D4AF37;
            transition: all 0.3s;
        }

        .btn-outline-gold:hover {
            background: #D4AF37;
            color: #000;
        }

        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease-out;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        #mobile-menu {
            transition: transform 0.3s ease-in-out;
            transform: translateY(-100%);
        }

        #mobile-menu.active {
            transform: translateY(0);
        }

        /* Checkbox customizado "Lembrar de mim" */
        .checkbox-lembrar {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 1.25rem;
            width: 1.25rem;
            flex-shrink: 0;
            border-radius: 0.5rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }
        .checkbox-lembrar:hover {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.1);
        }
        input[name="lembrar"]:checked + .checkbox-lembrar {
            border-color: #D4AF37;
            background: #D4AF37;
        }
        input[name="lembrar"]:checked + .checkbox-lembrar .check-icon {
            opacity: 1;
        }
        input[name="lembrar"]:focus-visible + .checkbox-lembrar {
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.5);
        }
    </style>
</head>
<body>

    <!-- Navegação -->
    <nav class="fixed w-full z-[100] py-6 px-6 md:px-10 flex justify-between items-center transition-all duration-300" id="navbar">
        <div class="flex items-center">
            <!-- Botão Hambúrguer Mobile -->
            <button id="menu-toggle" class="md:hidden text-white mr-4 focus:outline-none">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path id="menu-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
                </svg>
            </button>
            <a href="index.html" class="text-xl md:text-2xl font-extrabold tracking-tighter shrink-0">
                <span class="text-white">PRO</span><span class="text-gold">TECH</span> <span class="hidden sm:inline text-xs font-light text-gray-400">LAB</span>
            </a>
        </div>

        <!-- Links Desktop -->
        <div class="hidden md:flex space-x-8 text-sm font-medium text-gray-300">
            <a href="index.html#inicio" class="hover:text-gold transition">Início</a>
            <a href="index.html#recursos" class="hover:text-gold transition">Recursos</a>
            <a href="index.html#sobre" class="hover:text-gold transition">Sobre</a>
            <a href="index.html#precos" class="hover:text-gold transition">Preços</a>
        </div>

        <div class="flex items-center space-x-3 md:space-x-6">
            <a href="login.html" class="text-xs md:text-sm font-semibold text-gray-400 hover:text-white transition">Login</a>
            <a href="signup.html" class="btn-primary px-4 md:px-6 py-2 rounded-lg text-xs md:text-sm whitespace-nowrap">Sign Up</a>
        </div>
    </nav>

    <!-- Menu Mobile Overlay -->
    <div id="mobile-menu" class="fixed top-0 left-0 w-full h-auto bg-black/95 backdrop-blur-xl z-[90] pt-24 pb-10 border-b border-gold/20 md:hidden shadow-2xl">
        <div class="flex flex-col items-center space-y-6 text-lg font-medium">
            <a href="index.html#inicio" class="text-gray-300 hover:text-gold transition mobile-link">Início</a>
            <a href="index.html#recursos" class="text-gray-300 hover:text-gold transition mobile-link">Recursos</a>
            <a href="index.html#sobre" class="text-gray-300 hover:text-gold transition mobile-link">Sobre</a>
            <a href="index.html#precos" class="text-gray-300 hover:text-gold transition mobile-link">Preços</a>
        </div>
    </div>

    <!-- Conteúdo Principal -->
    <section class="relative min-h-screen flex items-center justify-center pt-24 pb-16 overflow-hidden">
        <div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-yellow-900/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-5%] left-[-5%] w-[300px] h-[300px] bg-yellow-900/5 rounded-full blur-[80px]"></div>

        <div class="container mx-auto px-6 z-10 flex justify-center">
            <div class="glass-card gold-border w-full max-w-md p-8 md:p-10 rounded-3xl reveal">
                <div class="text-center mb-8">
                    <h1 class="text-2xl md:text-3xl font-black tracking-tight mb-2">
                        Entrar
                    </h1>
                    <p class="text-gray-500 text-sm">Use seu e-mail e senha para acessar o painel.</p>
                </div>

                <form id="seu-formulario-login" class="space-y-6">
                    <div>
                        <label for="email" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 block">E-mail</label>
                        <input type="email" id="email" name="email" required
                            placeholder="seu@email.com"
                            class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/30 outline-none text-sm transition-all text-white placeholder-gray-500">
                    </div>
                    <div>
                        <label for="senha" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 block">Senha</label>
                        <input type="password" id="senha" name="senha" required
                            placeholder="••••••••"
                            class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/30 outline-none text-sm transition-all text-white placeholder-gray-500">
                    </div>
                    <div class="flex items-center justify-between text-sm">
                        <label class="flex cursor-pointer items-center gap-3 text-gray-400 transition hover:text-white">
                            <input type="checkbox" name="lembrar" class="sr-only" />
                            <span class="checkbox-lembrar">
                                <svg class="check-icon h-3 w-3 text-black opacity-0 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                                </svg>
                            </span>
                            <span>Lembrar de mim</span>
                        </label>
                        <a href="#" id="esqueci-senha" class="text-gray-500 hover:text-gold transition">Esqueci a senha</a>
                    </div>
                    <button type="submit" id="btn-entrar" class="w-full btn-primary py-4 rounded-2xl text-sm font-black uppercase shadow-lg hover:shadow-[#D4AF37]/30 transition">
                        Entrar
                    </button>
                </form>

                <p class="text-center text-gray-500 text-sm mt-6">
                    Não tem conta? <a href="signup.html" class="text-gold font-semibold hover:underline">Cadastre-se</a>
                </p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-8 border-t border-white/5 bg-black relative z-10">
        <div class="container mx-auto px-6 text-center">
            <a href="index.html" class="text-xl font-extrabold tracking-tighter hover:opacity-80 transition-opacity">
                <span class="text-white">PRO</span><span class="text-gold">TECH</span> <span class="text-xs font-light text-gray-400">LAB</span>
            </a>
            <p class="text-gray-600 text-xs mt-2">© 2024 ProTech Lab. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script>
        // Logica Navbar Scroll (igual à index)
        window.addEventListener('scroll', function() {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) {
                nav.classList.add('bg-black/90', 'backdrop-blur-xl', 'py-4', 'border-b', 'border-white/5');
                nav.classList.remove('py-6');
            } else {
                nav.classList.remove('bg-black/90', 'backdrop-blur-xl', 'py-4', 'border-b', 'border-white/5');
                nav.classList.add('py-6');
            }
        });

        // Menu mobile
        const menuToggle = document.getElementById('menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuIcon = document.getElementById('menu-icon');
        const mobileLinks = document.querySelectorAll('.mobile-link');

        function toggleMenu() {
            const isActive = mobileMenu.classList.toggle('active');
            if (isActive) {
                menuIcon.setAttribute('d', 'M6 18L18 6M6 6l12 12'); // Icone X
            } else {
                menuIcon.setAttribute('d', 'M4 6h16M4 12h16m-7 6h7'); // Icone Hamburguer
            }
        }

        menuToggle.addEventListener('click', toggleMenu);

        // Fecha menu ao clicar em links
        mobileLinks.forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.classList.remove('active');
                menuIcon.setAttribute('d', 'M4 6h16M4 12h16m-7 6h7');
            });
        });

        // Revelar card
        document.querySelectorAll('.reveal').forEach(el => {
            el.classList.add('active');
        });

        const formLogin = document.querySelector('#seu-formulario-login');

        formLogin.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.querySelector('#email').value.trim(); // .trim() tira espaços invisíveis!
            const senha = document.querySelector('#senha').value;
            const btnEntrar = document.querySelector('#btn-entrar');

            btnEntrar.disabled = true;
            btnEntrar.innerText = "VERIFICANDO...";

            try {
                const response = await fetch('https://storepanel-backend.onrender.com/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // Envia senha e password para o servidor nunca falhar
                    body: JSON.stringify({ email: email, senha: senha, password: senha })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Limpa os limites caso venham como texto
                    let limitesParse = { stores: 1, items: 10 };
                    if (data.user && data.user.limites) {
                        try { limitesParse = typeof data.user.limites === 'string' ? JSON.parse(data.user.limites) : data.user.limites; } catch(e){}
                    }

                    const userDataToSave = {
                        nome: data.user ? data.user.nome : "Administrador",
                        email: data.user ? data.user.email : email,
                        plan: data.user ? data.user.plano : 'VIP',
                        planExpiresAt: data.user ? data.user.planExpiresAt : (Date.now() + (30 * 24 * 60 * 60 * 1000)),
                        limits: limitesParse
                    };

                    localStorage.setItem('usuarioLogado', JSON.stringify(userDataToSave));
                    window.location.href = 'dashboard.html';
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Acesso Negado',
                        text: data.message || 'E-mail ou senha incorretos.',
                        background: '#121212',
                        color: '#fff',
                        confirmButtonColor: '#D4AF37'
                    });
                }
            } catch (error) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Erro de Conexão',
                    text: 'Não foi possível contatar o servidor.',
                    background: '#121212',
                    color: '#fff',
                    confirmButtonColor: '#D4AF37'
                });
            } finally {
                btnEntrar.disabled = false;
                btnEntrar.innerText = "Entrar";
            }
        });

        // --- LÓGICA DE ESQUECI A SENHA ---
        document.getElementById('esqueci-senha').addEventListener('click', async (e) => {
            e.preventDefault();

            // Abre o popup pedindo o email
            const { value: emailForm } = await Swal.fire({
                title: 'Recuperar Senha',
                input: 'email',
                inputLabel: 'Digite seu e-mail de cadastro',
                inputPlaceholder: 'seu@email.com',
                background: '#121212',
                color: '#fff',
                confirmButtonColor: '#D4AF37',
                cancelButtonColor: '#333',
                showCancelButton: true,
                confirmButtonText: 'Enviar Link',
                cancelButtonText: 'Cancelar',
                validationMessage: 'Por favor, insira um e-mail válido.'
            });

            // Se a pessoa digitou um email e clicou em Enviar
            if (emailForm) {
                Swal.fire({
                    title: 'Enviando...',
                    text: 'Aguarde um momento.',
                    background: '#121212',
                    color: '#fff',
                    allowOutsideClick: false,
                    didOpen: () => { Swal.showLoading(); }
                });

                try {
                    const response = await fetch('https://storepanel-backend.onrender.com/forgot-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: emailForm })
                    });

                    if (response.ok) {
                        Swal.fire({
                            icon: 'success',
                            title: 'Solicitação Enviada!',
                            text: 'Se o e-mail constar em nossa base, você receberá instruções para redefinir sua senha.',
                            background: '#121212',
                            color: '#fff',
                            confirmButtonColor: '#D4AF37'
                        });
                    } else {
                        throw new Error('Falha no servidor');
                    }
                } catch (error) {
                    Swal.fire({
                        icon: 'warning',
                        title: 'Erro de Conexão',
                        text: 'Não foi possível contatar o servidor.',
                        background: '#121212',
                        color: '#fff',
                        confirmButtonColor: '#D4AF37'
                    });
                }
            }
        });
    </script>
</body>
</html>
