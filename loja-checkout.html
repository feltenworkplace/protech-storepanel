<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Premium | ProTech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030303; color: #fff; }
        
        .bg-glow {
            position: fixed; top: -20%; left: -10%; width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(212,175,55,0.08) 0%, transparent 70%);
            z-index: -1; pointer-events: none;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
        }

        .input-premium {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 20px;
            border-radius: 1rem;
            color: #fff;
            outline: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-premium:focus {
            border-color: #D4AF37;
            background: rgba(212, 175, 55, 0.02);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
            transform: translateY(-2px);
        }

        .btn-gold {
            background: linear-gradient(135deg, #D4AF37 0%, #F3E5AB 50%, #D4AF37 100%);
            background-size: 200% auto;
            color: #000;
            transition: all 0.5s ease;
        }
        .btn-gold:hover {
            background-position: right center;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
            transform: translateY(-3px);
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }

        /* Esconde o input radio padrão */
        .payment-radio:checked + div {
            border-color: #D4AF37;
            background: rgba(212, 175, 55, 0.1);
        }
        .payment-radio:checked + div .radio-dot {
            background-color: #D4AF37;
            box-shadow: 0 0 10px #D4AF37;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col lg:flex-row overflow-x-hidden relative">
    
    <div class="bg-glow"></div>

    <main class="w-full lg:w-3/5 p-8 md:p-16 flex flex-col justify-center overflow-hidden">
        
        <div class="max-w-xl mx-auto w-full relative">
            <button onclick="window.history.back()" class="flex items-center gap-3 text-gray-500 hover:text-[#D4AF37] transition-colors mb-12 group">
                <svg class="w-5 h-5 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                <span class="text-[10px] font-black uppercase tracking-[0.2em]">Voltar à Loja</span>
            </button>

            <div class="flex items-center justify-between mb-16 relative">
                <div class="absolute left-0 top-1/2 -translate-y-1/2 w-full h-px bg-white/10 -z-10"></div>
                <div id="progress-bar" class="absolute left-0 top-1/2 -translate-y-1/2 w-1/4 h-px bg-[#D4AF37] shadow-[0_0_10px_#D4AF37] -z-10 transition-all duration-500"></div>
                
                <div id="step1-indicator" class="w-10 h-10 rounded-full bg-black border-2 border-[#D4AF37] text-[#D4AF37] shadow-[0_0_15px_rgba(212,175,55,0.3)] flex items-center justify-center text-xs font-black z-10 transition-all duration-500">01</div>
                <div id="step2-indicator" class="w-10 h-10 rounded-full bg-black border border-white/20 text-gray-500 flex items-center justify-center text-xs font-black z-10 transition-all duration-500">02</div>
                <div class="w-10 h-10 rounded-full bg-black border border-white/20 text-gray-500 flex items-center justify-center text-xs font-black z-10 opacity-50">03</div>
            </div>

            <div class="overflow-hidden w-full">
                <div id="form-slider" class="flex w-[200%] transition-transform duration-500 ease-in-out">
                    
                    <div class="w-1/2 pr-4 shrink-0">
                        <h2 class="text-3xl font-black tracking-tighter mb-2">Seus Dados</h2>
                        <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-10">Preencha com atenção</p>

                        <form id="step1-form" class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 block mb-3 pl-2">Nome Completo</label>
                                    <input type="text" id="cli-name" placeholder="Ex: Seu Nome" class="input-premium" required>
                                </div>
                                <div>
                                    <label class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 block mb-3 pl-2">CPF</label>
                                    <input type="text" id="cli-cpf" placeholder="000.000.000-00" maxlength="14" class="input-premium" required>
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 block mb-3 pl-2">E-mail</label>
                                    <input type="email" id="cli-email" placeholder="seumail@email.com" class="input-premium" required>
                                </div>
                                <div>
                                    <label class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 block mb-3 pl-2">Celular</label>
                                    <input type="text" id="cli-phone" placeholder="(00) 00000-0000" maxlength="15" class="input-premium" required>
                                </div>
                            </div>

                            <div class="pt-8">
                                <button type="button" onclick="goToStep2()" class="w-full btn-gold py-5 rounded-xl font-black uppercase tracking-[0.2em] text-sm flex items-center justify-center gap-3 shadow-lg">
                                    Continuar para Pagamento
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                                </button>
                            </div>
                        </form>
                    </div>

                    <div class="w-1/2 pl-4 shrink-0">
                        <div class="flex items-center gap-4 mb-10">
                            <button type="button" onclick="goToStep1()" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-white hover:bg-white/10 hover:border-[#D4AF37] transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                            </button>
                            <div>
                                <h2 class="text-3xl font-black tracking-tighter mb-1">Pagamento</h2>
                                <p class="text-xs font-bold text-gray-500 uppercase tracking-widest">Escolha o método</p>
                            </div>
                        </div>

                        <div class="space-y-4 mb-8">
                            <label class="block cursor-pointer relative">
                                <input type="radio" name="payment_method" value="pix" class="peer sr-only payment-radio" checked onchange="togglePaymentView()">
                                <div class="w-full p-5 rounded-xl border border-white/10 bg-black/50 flex items-center gap-4 transition-all">
                                    <div class="w-5 h-5 rounded-full border border-gray-500 flex items-center justify-center shrink-0">
                                        <div class="radio-dot w-2.5 h-2.5 rounded-full bg-transparent transition-colors"></div>
                                    </div>
                                    <div class="flex-1 flex items-center justify-between">
                                        <span class="font-bold text-sm tracking-wide">PIX (Aprovação Imediata)</span>
                                        <svg class="w-6 h-6 text-[#32BCAD]" fill="currentColor" viewBox="0 0 24 24"><path d="M12.016 0C5.385 0 0 5.385 0 12.016s5.385 12.016 12.016 12.016 12.016-5.385 12.016-12.016S18.647 0 12.016 0zm-2.27 18.068l-3.32-3.32 1.487-1.488 1.833 1.834 5.76-5.76 1.488 1.488-7.248 7.246z"/></svg>
                                    </div>
                                </div>
                            </label>

                            <label class="block cursor-pointer relative">
                                <input type="radio" name="payment_method" value="credit_card" class="peer sr-only payment-radio" onchange="togglePaymentView()">
                                <div class="w-full p-5 rounded-xl border border-white/10 bg-black/50 flex items-center gap-4 transition-all">
                                    <div class="w-5 h-5 rounded-full border border-gray-500 flex items-center justify-center shrink-0">
                                        <div class="radio-dot w-2.5 h-2.5 rounded-full bg-transparent transition-colors"></div>
                                    </div>
                                    <div class="flex-1 flex items-center justify-between">
                                        <span class="font-bold text-sm tracking-wide">Cartão de Crédito</span>
                                        <div class="flex gap-2">
                                            <div class="w-8 h-5 bg-white/10 rounded"></div>
                                            <div class="w-8 h-5 bg-white/10 rounded"></div>
                                        </div>
                                    </div>
                                </div>
                            </label>
                        </div>

                        <div id="credit-card-form" class="hidden space-y-4 mb-8 bg-white/5 p-6 rounded-2xl border border-white/10">
                            <div>
                                <label class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 block mb-2">Número do Cartão</label>
                                <input type="text" placeholder="0000 0000 0000 0000" class="input-premium !py-3">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 block mb-2">Validade</label>
                                    <input type="text" placeholder="MM/AA" class="input-premium !py-3">
                                </div>
                                <div>
                                    <label class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 block mb-2">CVV</label>
                                    <input type="text" placeholder="123" class="input-premium !py-3">
                                </div>
                            </div>
                            <div>
                                <label class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 block mb-2">Nome Impresso</label>
                                <input type="text" placeholder="Nome no cartão" class="input-premium !py-3">
                            </div>
                        </div>

                        <div class="pt-4">
                            <button type="button" onclick="finalizeOrder()" id="btn-finalize" class="w-full btn-gold py-5 rounded-xl font-black uppercase tracking-[0.2em] text-sm flex items-center justify-center shadow-lg">
                                Gerar PIX
                            </button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <aside class="w-full lg:w-2/5 p-8 md:p-16 flex items-center relative z-10">
        <div class="glass-panel w-full max-w-md mx-auto p-8 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-[#D4AF37] opacity-10 blur-[50px] rounded-full"></div>

            <h3 class="text-sm font-black uppercase tracking-[0.3em] text-[#D4AF37] mb-8">Resumo do Pedido</h3>
            
            <div id="checkout-items-list" class="space-y-6 mb-10 max-h-[40vh] overflow-y-auto custom-scroll pr-4 pt-5">
                </div>

            <div class="flex gap-3 mb-10">
                <input type="text" id="coupon-code" placeholder="CÓDIGO PROMO" class="input-premium !py-3 !text-xs uppercase placeholder:normal-case font-bold tracking-widest">
                <button type="button" onclick="applyCoupon()" class="bg-white hover:bg-[#D4AF37] text-black font-black uppercase tracking-widest text-[10px] px-6 rounded-xl transition-all duration-300 shrink-0">
                    Aplicar
                </button>
            </div>

            <div class="space-y-4 pt-6 border-t border-white/10">
                <div class="flex justify-between text-xs font-bold uppercase tracking-widest text-gray-500">
                    <span>Subtotal</span>
                    <span id="summary-subtotal" class="text-white">R$ 0,00</span>
                </div>
                <div id="discount-row" class="hidden justify-between text-xs font-bold uppercase tracking-widest text-emerald-400">
                    <span>Desconto Aplicado</span>
                    <span id="summary-discount">- R$ 0,00</span>
                </div>
            </div>

            <div class="flex justify-between items-end pt-8 mt-6 border-t border-white/10">
                <span class="text-xs font-black uppercase tracking-[0.2em] text-gray-400 mb-1">Total a Pagar</span>
                <span id="summary-total" class="text-4xl font-black text-[#D4AF37] tracking-tighter">R$ 0,00</span>
            </div>
        </div>
    </aside>

    <script>
        const cartItems = JSON.parse(localStorage.getItem('protech_active_cart')) || [];
        let subtotalCart = 0;
        let totalDiscount = 0;

        // Renderiza itens e corrige bolinha cortada
        function renderCheckoutItems() {
            const list = document.getElementById('checkout-items-list');
            subtotalCart = 0; 
            
            if (cartItems.length === 0) {
                list.innerHTML = '<div class="text-center py-10"><p class="text-gray-600 text-[10px] font-black uppercase tracking-[0.3em]">Carrinho Vazio</p></div>';
                return;
            }

            let html = '';
            cartItems.forEach(item => {
                const safePrice = Number(item.price);
                subtotalCart += safePrice * item.quantity;
                
                html += `
                    <div class="flex items-center justify-between group">
                        <div class="flex items-center gap-4">
                            <div class="relative shrink-0">
                                <img src="${item.image}" class="w-14 h-14 rounded-2xl object-cover border border-white/10 bg-black group-hover:border-[#D4AF37]/50 transition-colors">
                                <span class="absolute -top-3 -right-3 bg-[#D4AF37] text-black text-[10px] font-black w-6 h-6 rounded-full flex items-center justify-center shadow-[0_0_10px_rgba(212,175,55,0.4)] border-2 border-black z-10">${item.quantity}</span>
                            </div>
                            <div>
                                <h4 class="text-xs text-white font-bold leading-tight mb-1">${item.name}</h4>
                                <p class="text-[9px] text-gray-500 font-black uppercase tracking-widest">Qtd: ${item.quantity}</p>
                            </div>
                        </div>
                        <span class="text-sm text-white font-black whitespace-nowrap pl-4">R$ ${(safePrice * item.quantity).toFixed(2)}</span>
                    </div>
                `;
            });

            list.innerHTML = html;
            updateTotalsDisplay();
        }

        function updateTotalsDisplay() {
            document.getElementById('summary-subtotal').innerText = `R$ ${subtotalCart.toFixed(2)}`;
            document.getElementById('summary-total').innerText = `R$ ${(subtotalCart - totalDiscount).toFixed(2)}`;
        }

        function applyCoupon() {
            const codeInput = document.getElementById('coupon-code').value.trim().toUpperCase();
            if (!codeInput) return;

            const params = new URLSearchParams(window.location.search);
            const slug = params.get('s');
            const stores = JSON.parse(localStorage.getItem('protech_stores_v1') || '[]');
            const store = stores.find(s => s.slug === slug);
            
            if (!store || !store.coupons) return alert("Erro ao conectar com a loja.");

            const coupon = store.coupons.find(c => c.code === codeInput && c.status === 'Ativo');

            if (!coupon) {
                alert("Cupom inválido ou expirado.");
                return;
            }

            totalDiscount = 0;
            cartItems.forEach(item => {
                if (coupon.categories.includes(item.categoryId)) {
                    const itemTotal = Number(item.price) * item.quantity;
                    totalDiscount += itemTotal * (coupon.discount / 100);
                }
            });

            if (totalDiscount > 0) {
                const row = document.getElementById('discount-row');
                row.classList.remove('hidden');
                row.classList.add('flex');
                document.getElementById('summary-discount').innerText = `- R$ ${totalDiscount.toFixed(2)}`;
                updateTotalsDisplay();
            } else {
                alert("Este cupom não se aplica aos itens selecionados.");
            }
        }

        // --- MÁSCARAS ---
        document.getElementById('cli-cpf').addEventListener('input', e => {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 11) v = v.slice(0, 11);
            v = v.replace(/(\d{3})(\d)/, '$1.$2');
            v = v.replace(/(\d{3})(\d)/, '$1.$2');
            v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            e.target.value = v;
        });

        document.getElementById('cli-phone').addEventListener('input', e => {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 11) v = v.slice(0, 11);
            v = v.replace(/(\d{2})(\d)/, '($1) $2');
            v = v.replace(/(\d{5})(\d)/, '$1-$2');
            e.target.value = v;
        });

        // --- LÓGICA DO SLIDER (PASSO 1 E PASSO 2) ---
        function goToStep2() {
            const n = document.getElementById('cli-name').value;
            const e = document.getElementById('cli-email').value;
            const c = document.getElementById('cli-cpf').value;
            
            if(!n || !e || !c) {
                alert("Por favor, preencha Nome, CPF e E-mail para continuar.");
                return;
            }
            
            // Move o slider para a esquerda (-50%)
            document.getElementById('form-slider').style.transform = 'translateX(-50%)';
            
            // Atualiza barra e indicadores
            document.getElementById('progress-bar').style.width = '75%';
            document.getElementById('step2-indicator').classList.remove('border-white/20', 'text-gray-500');
            document.getElementById('step2-indicator').classList.add('border-[#D4AF37]', 'text-[#D4AF37]', 'shadow-[0_0_15px_rgba(212,175,55,0.3)]');
        }

        function goToStep1() {
            // Volta o slider para a posição original (0)
            document.getElementById('form-slider').style.transform = 'translateX(0)';
            
            // Reverte barra e indicadores
            document.getElementById('progress-bar').style.width = '25%';
            document.getElementById('step2-indicator').classList.add('border-white/20', 'text-gray-500');
            document.getElementById('step2-indicator').classList.remove('border-[#D4AF37]', 'text-[#D4AF37]', 'shadow-[0_0_15px_rgba(212,175,55,0.3)]');
        }

        function togglePaymentView() {
            const method = document.querySelector('input[name="payment_method"]:checked').value;
            const cardForm = document.getElementById('credit-card-form');
            const btnFinalize = document.getElementById('btn-finalize');

            if (method === 'credit_card') {
                cardForm.classList.remove('hidden');
                btnFinalize.innerText = 'Pagar com Cartão';
            } else {
                cardForm.classList.add('hidden');
                btnFinalize.innerText = 'Gerar PIX';
            }
        }

        async function finalizeOrder() {
            const method = document.querySelector('input[name="payment_method"]:checked').value;
            const btnFinalize = document.getElementById('btn-finalize');
            
            const nome = document.getElementById('cli-name').value;
            const cpf = document.getElementById('cli-cpf').value;
            const email = document.getElementById('cli-email').value;

            if(!nome || !cpf || !email) return alert("Preencha seus dados primeiro!");

            const params = new URLSearchParams(window.location.search);
            const slug = params.get('s');
            const stores = JSON.parse(localStorage.getItem('protech_stores_v1') || '[]');
            const store = stores.find(s => s.slug === slug);

            if (!store || !store.settings || !store.settings.mpToken) {
                alert("Esta loja ainda não configurou o Mercado Pago.");
                return;
            }

            const valorTotal = (subtotalCart - totalDiscount).toFixed(2);

            if (method === 'pix') {
                btnFinalize.innerText = "Conectando ao Banco...";
                btnFinalize.classList.add('opacity-50', 'pointer-events-none');

                try {
                    // ATENÇÃO: Se estiver a testar a partir do GitHub Pages (online), 
                    // tem de usar o link do seu Render aqui! 
                    // Exemplo: fetch('https://seu-backend-render.onrender.com/create-pix'
                    const resposta = await fetch('https://storepanel-backend.onrender.com/create-pix', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            lojaToken: store.settings.mpToken, 
                            cliente: { nome, cpf, email }, 
                            valor: valorTotal, 
                            itens: cartItems 
                        })
                    });

                    const dados = await resposta.json();

                    if (dados.success) {
                        // --- CÓDIGO NOVO: INJETAR VENDA NO DASHBOARD ---
                        let storesAtualizadas = JSON.parse(localStorage.getItem('protech_stores_v1') || '[]');
                        let indexLoja = storesAtualizadas.findIndex(s => s.slug === slug);
                        
                        if (indexLoja !== -1) {
                            if (!storesAtualizadas[indexLoja].orders) storesAtualizadas[indexLoja].orders = [];
                            
                            const novoPedido = {
                                id: 'PED-' + Math.floor(Math.random() * 100000), 
                                cliente: nome,
                                email: email,
                                cpf: cpf,
                                total: Number(valorTotal),
                                metodo: 'PIX',
                                status: 'Aprovado', 
                                data: new Date().toISOString(),
                                itens: cartItems
                            };
                            
                            storesAtualizadas[indexLoja].orders.push(novoPedido);
                            localStorage.setItem('protech_stores_v1', JSON.stringify(storesAtualizadas));
                            
                            localStorage.removeItem('protech_active_cart'); 
                        }
                        // -----------------------------------------------

                        // 1. MÁGICA VISUAL: Troca o formulário pelo QR CODE!
                        const wRight = document.querySelector('.w-1\\/2.pl-4');
                        wRight.innerHTML = `
                            <div class="text-center animate-bounce-short">
                                <h2 class="text-2xl font-black text-[#D4AF37] mb-2">PIX Gerado!</h2>
                                <p class="text-xs text-gray-400 mb-6 uppercase tracking-widest">Escaneie para pagar</p>
                                
                                <div class="bg-white p-4 rounded-3xl inline-block mb-6 shadow-[0_0_30px_rgba(212,175,55,0.2)]">
                                    <img src="data:image/jpeg;base64,${dados.qr_code_base64}" class="w-48 h-48 rounded-xl">
                                </div>
                                
                                <div>
                                    <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-2">Ou use o PIX Copia e Cola</p>
                                    <div class="flex gap-2">
                                        <input type="text" readonly value="${dados.qr_code}" class="input-premium !py-3 text-[10px] text-gray-400 font-mono">
                                        <button onclick="navigator.clipboard.writeText('${dados.qr_code}'); alert('Copiado com sucesso!')" class="bg-white/10 hover:bg-[#D4AF37] hover:text-black transition-colors px-4 rounded-xl text-xs font-black uppercase">Copiar</button>
                                    </div>
                                </div>
                                
                                <div class="mt-8 flex items-center justify-center gap-3 text-[10px] text-gray-500 uppercase tracking-widest font-bold">
                                    <svg class="w-4 h-4 animate-spin text-[#D4AF37]" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                    Aguardando Pagamento...
                                </div>
                            </div>
                        `;

                        // 2. SIMULAÇÃO DE APROVAÇÃO (Espera 5 segundos e muda a tela)
                        setTimeout(() => {
                            wRight.innerHTML = `
                                <div class="text-center animate-bounce-short">
                                    <div class="w-20 h-20 bg-emerald-500/10 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6 border border-emerald-500/20 shadow-[0_0_30px_rgba(16,185,129,0.2)]">
                                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                                    </div>
                                    <h2 class="text-3xl font-black text-white mb-2 tracking-tight">Pagamento Aprovado!</h2>
                                    <p class="text-xs text-gray-400 mb-8 uppercase tracking-widest">Obrigado pela sua compra.</p>
                                    
                                    <div class="bg-white/5 border border-white/10 rounded-3xl p-6 mb-8 text-left relative overflow-hidden">
                                        <div class="absolute top-0 right-0 w-32 h-32 bg-emerald-500 opacity-5 blur-[50px] rounded-full"></div>
                                        
                                        <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold mb-1">Status do Pedido</p>
                                        <p class="text-emerald-500 font-black text-sm mb-4">Concluído e Entregue</p>
                                        
                                        <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold mb-1">ID da Transação</p>
                                        <p class="text-white font-mono text-xs">${dados.payment_id}</p>
                                    </div>
                                    
                                    <button onclick="window.history.back()" class="bg-white/10 hover:bg-white/20 text-white font-black uppercase tracking-widest text-[10px] px-8 py-4 rounded-xl transition-all duration-300 w-full">
                                        Voltar para a Loja
                                    </button>
                                </div>
                            `;
                        }, 5000); // 5000 milissegundos = 5 segundos

                    } else {
                        alert("Erro: " + dados.message);
                        btnFinalize.innerText = "Tentar Novamente";
                        btnFinalize.classList.remove('opacity-50', 'pointer-events-none');
                    }

                } catch (error) {
                    alert("Erro ao conectar com o servidor.");
                    btnFinalize.innerText = "Gerar PIX";
                    btnFinalize.classList.remove('opacity-50', 'pointer-events-none');
                }
            } else {
                alert("Processando pagamento via Cartão de Crédito...");
            }
        }

        document.addEventListener('DOMContentLoaded', renderCheckoutItems);
    </script>
