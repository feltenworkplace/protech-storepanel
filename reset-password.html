<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - ProTech Lab</title>
    <style>
        body {
            /* Fundo menos vazio, com um leve gradiente focado no topo */
            background: radial-gradient(circle at top, #1f1d18 0%, #0b0b0b 60%);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .brand {
            color: #D4AF37;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }
        .container {
            background-color: #111;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h2 { color: #fff; margin-top: 0; font-size: 22px; }
        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            color: #aaa;
            font-size: 13px;
            margin-bottom: 5px;
            margin-left: 5%;
        }
        input {
            width: 90%;
            padding: 12px;
            background-color: #000;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
            margin-left: 5%;
        }
        input:focus {
            outline: none;
            border-color: #D4AF37;
        }
        button {
            background-color: #D4AF37;
            color: #000;
            border: none;
            padding: 14px 20px;
            width: 90%;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
            transition: 0.3s;
        }
        button:hover { background-color: #b5952f; }
        #mensagem { margin-top: 20px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="brand">ProTech Lab</div>

    <div class="container">
        <h2>Crie sua nova senha</h2>
        <p style="color: #888; font-size: 14px; margin-bottom: 25px;">Digite a nova senha que deseja usar para aceder ao painel.</p>
        
        <div class="input-group">
            <label for="novaSenha">Nova senha</label>
            <input type="password" id="novaSenha" placeholder="Nova senha">
        </div>

        <div class="input-group">
            <label for="confirmarSenha">Repita a senha</label>
            <input type="password" id="confirmarSenha" placeholder="Confirmar nova senha">
        </div>

        <button onclick="redefinirSenha()">Salvar Nova Senha</button>
        
        <div id="mensagem"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        async function redefinirSenha() {
            const novaSenha = document.getElementById('novaSenha').value;
            const confirmarSenha = document.getElementById('confirmarSenha').value;
            const mensagemDiv = document.getElementById('mensagem');

            // Validação 1: Campos vazios
            if (!novaSenha || !confirmarSenha) {
                mensagemDiv.innerHTML = "<span style='color: #ff4444;'>Por favor, preencha ambos os campos.</span>";
                return;
            }

            // Validação 2: Senhas não coincidem (O que você pediu!)
            if (novaSenha !== confirmarSenha) {
                mensagemDiv.innerHTML = "<span style='color: #ff4444;'>As senhas não coincidem. Tente novamente.</span>";
                return;
            }

            // Validação 3: Token ausente
            if (!token) {
                mensagemDiv.innerHTML = "<span style='color: #ff4444;'>Link inválido ou expirado.</span>";
                return;
            }

            mensagemDiv.innerHTML = "<span style='color: #D4AF37;'>A salvar...</span>";

            try {
                // Substitua pelo link do seu Render se for testar online
                const resposta = await fetch('https://storepanel-backend.onrender.com/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, novaSenha: novaSenha })
                });

                const dados = await resposta.json();

                if (dados.success) {
                    mensagemDiv.innerHTML = "<span style='color: #00C851;'>Senha alterada com sucesso! Redirecionando...</span>";
                    setTimeout(() => { window.location.href = 'login.html'; }, 3000);
                } else {
                    mensagemDiv.innerHTML = `<span style='color: #ff4444;'>${dados.message}</span>`;
                }
            } catch (error) {
                mensagemDiv.innerHTML = "<span style='color: #ff4444;'>Erro de conexão com o servidor.</span>";
            }
        }
    </script>
</body>
</html>
