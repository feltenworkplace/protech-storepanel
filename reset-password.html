<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - ProTech Lab</title>
    <style>
        body {
            background-color: #0b0b0b;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #111;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h2 { color: #D4AF37; margin-top: 0; }
        input {
            width: 90%;
            padding: 12px;
            margin: 15px 0;
            background-color: #000;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
        }
        button {
            background-color: #D4AF37;
            color: #000;
            border: none;
            padding: 12px 20px;
            width: 100%;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
        }
        button:hover { background-color: #b5952f; }
        #mensagem { margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Criar Nova Senha</h2>
        <p style="color: #aaa; font-size: 14px;">Digite a sua nova senha abaixo.</p>
        
        <input type="password" id="novaSenha" placeholder="Sua nova senha secreta">
        <button onclick="redefinirSenha()">Salvar Nova Senha</button>
        
        <div id="mensagem"></div>
    </div>

    <script>
        // 1. Pega no código secreto (token) que veio no link do e-mail
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        async function redefinirSenha() {
            const novaSenha = document.getElementById('novaSenha').value;
            const mensagemDiv = document.getElementById('mensagem');

            if (!novaSenha) {
                mensagemDiv.innerHTML = "<span style='color: red;'>Por favor, digite uma senha.</span>";
                return;
            }

            if (!token) {
                mensagemDiv.innerHTML = "<span style='color: red;'>Link inválido ou quebrado.</span>";
                return;
            }

            mensagemDiv.innerHTML = "<span style='color: #D4AF37;'>A guardar...</span>";

            try {
                // ATENÇÃO: Se o seu backend estiver no Render, troque o link abaixo pelo link do Render!
                const resposta = await fetch('https://storepanel-backend.onrender.com/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, novaSenha: novaSenha })
                });

                const dados = await resposta.json();

                if (dados.success) {
                    mensagemDiv.innerHTML = "<span style='color: #4CAF50;'>Senha alterada com sucesso! Redirecionando...</span>";
                    setTimeout(() => { window.location.href = 'login.html'; }, 3000);
                } else {
                    mensagemDiv.innerHTML = `<span style='color: red;'>${dados.message}</span>`;
                }
            } catch (error) {
                mensagemDiv.innerHTML = "<span style='color: red;'>Erro ao conectar com o servidor.</span>";
            }
        }
    </script>
</body>
</html>
