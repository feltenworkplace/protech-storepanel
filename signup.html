<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar | ProTech Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #080808;
            color: #ffffff;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        .gold-glow {
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .gold-border {
            border: 1px solid rgba(212, 175, 55, 0.5);
        }

        .text-gold {
            color: #D4AF37;
        }

        .glass-card {
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: #D4AF37;
            opacity: 0.6;
        }

        .glass-card:hover {
            border-color: rgba(212, 175, 55, 0.6);
            box-shadow: 0 10px 30px -10px rgba(212, 175, 55, 0.2);
        }

        .btn-primary {
            background-color: #D4AF37;
            color: #000;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .btn-outline-gold {
            border: 1px solid #D4AF37;
            color: #D4AF37;
            transition: all 0.3s;
        }

        .btn-outline-gold:hover {
            background: #D4AF37;
            color: #000;
        }

        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease-out;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        #mobile-menu {
            transition: transform 0.3s ease-in-out;
            transform: translateY(-100%);
        }

        #mobile-menu.active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <!-- Navegação -->
    <nav class="fixed w-full z-[100] py-6 px-6 md:px-10 flex justify-between items-center transition-all duration-300" id="navbar">
        <div class="flex items-center">
            <!-- Botão Hambúrguer Mobile -->
            <button id="menu-toggle" class="md:hidden text-white mr-4 focus:outline-none">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path id="menu-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
                </svg>
            </button>
            <a href="index.html" class="text-xl md:text-2xl font-extrabold tracking-tighter shrink-0">
                <span class="text-white">PRO</span><span class="text-gold">TECH</span> <span class="hidden sm:inline text-xs font-light text-gray-400">LAB</span>
            </a>
        </div>
        <p id="msg-erro" class="text-red-500 text-xs font-bold text-center hidden mb-4"></p>

        <!-- Links Desktop -->
        <div class="hidden md:flex space-x-8 text-sm font-medium text-gray-300">
            <a href="index.html#inicio" class="hover:text-gold transition">Início</a>
            <a href="index.html#recursos" class="hover:text-gold transition">Recursos</a>
            <a href="index.html#sobre" class="hover:text-gold transition">Sobre</a>
            <a href="index.html#precos" class="hover:text-gold transition">Preços</a>
        </div>

        <div class="flex items-center space-x-3 md:space-x-6">
            <a href="login.html" class="text-xs md:text-sm font-semibold text-gray-400 hover:text-white transition">Login</a>
            <a href="signup.html" class="btn-primary px-4 md:px-6 py-2 rounded-lg text-xs md:text-sm whitespace-nowrap">Sign Up</a>
        </div>
    </nav>

    <!-- Menu Mobile Overlay -->
    <div id="mobile-menu" class="fixed top-0 left-0 w-full h-auto bg-black/95 backdrop-blur-xl z-[90] pt-24 pb-10 border-b border-gold/20 md:hidden shadow-2xl">
        <div class="flex flex-col items-center space-y-6 text-lg font-medium">
            <a href="index.html#inicio" class="text-gray-300 hover:text-gold transition mobile-link">Início</a>
            <a href="index.html#recursos" class="text-gray-300 hover:text-gold transition mobile-link">Recursos</a>
            <a href="index.html#sobre" class="text-gray-300 hover:text-gold transition mobile-link">Sobre</a>
            <a href="index.html#precos" class="text-gray-300 hover:text-gold transition mobile-link">Preços</a>
        </div>
    </div>

    <!-- Conteúdo Principal -->
    <section class="relative min-h-screen flex items-center justify-center pt-24 pb-16 overflow-hidden">
        <div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-yellow-900/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-5%] left-[-5%] w-[300px] h-[300px] bg-yellow-900/5 rounded-full blur-[80px]"></div>

        <div class="container mx-auto px-6 z-10 flex justify-center">
            <div class="glass-card gold-border w-full max-w-md p-8 md:p-10 rounded-3xl reveal">
                <div class="text-center mb-8">
                    <h1 class="text-2xl md:text-3xl font-black tracking-tight mb-2">
                        Criar conta
                    </h1>
                    <p class="text-gray-500 text-sm">Preencha os dados abaixo para começar.</p>
                </div>

                <form id="form-signup" class="space-y-6">
                    <div>
                        <label for="nome" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 block">Nome</label>
                        <input type="text" id="nome" name="nome" required
                            placeholder="Seu nome completo"
                            class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/30 outline-none text-sm transition-all text-white placeholder-gray-500">
                    </div>
                    <div>
                        <label for="email" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 block">E-mail</label>
                        <input type="email" id="email" name="email" required
                            placeholder="seu@email.com"
                            class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/30 outline-none text-sm transition-all text-white placeholder-gray-500">
                    </div>
                    <div>
                        <label for="senha" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 block">Senha</label>
                        <input type="password" id="senha" name="senha" required minlength="6"
                            placeholder="Mínimo 6 caracteres"
                            class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/30 outline-none text-sm transition-all text-white placeholder-gray-500">
                    </div>
                    <div>
                        <label for="confirmar-senha" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 block">Confirmar senha</label>
                        <input type="password" id="confirmar-senha" name="confirmar-senha" required minlength="6"
                            placeholder="Repita a senha"
                            class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37]/30 outline-none text-sm transition-all text-white placeholder-gray-500">
                    </div>

                    <div class="space-y-2">
                        <label for="plano" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 block ml-1">Selecione seu Plano</label>
                        <div class="relative">
                            <select id="plano" required class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:border-[#D4AF37] transition-all appearance-none text-white font-bold cursor-pointer">
                                <option value="" disabled selected class="bg-[#0c0c0c]">Escolha um plano...</option>
                                <option value="VIP" class="bg-[#0c0c0c]">Plano VIP (Starter)</option>
                                <option value="PRO" class="bg-[#0c0c0c]">Plano PRO (Elite)</option>
                                <option value="LEGEND" class="bg-[#0c0c0c]">Plano LEGEND (Expert)</option>
                            </select>
                            <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-gold">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                            </div>
                        </div>
                    </div>


                    <button type="submit" id="btn-cadastrar" class="w-full btn-primary py-4 rounded-2xl text-sm font-black uppercase shadow-lg hover:shadow-[#D4AF37]/30 transition">
                        Cadastrar
                    </button>
                </form>

                <p class="text-center text-gray-500 text-sm mt-6">
                    Já tem conta? <a href="login.html" class="text-gold font-semibold hover:underline">Entrar</a>
                </p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-8 border-t border-white/5 bg-black relative z-10">
        <div class="container mx-auto px-6 text-center">
            <a href="index.html" class="text-xl font-extrabold tracking-tighter hover:opacity-80 transition-opacity">
                <span class="text-white">PRO</span><span class="text-gold">TECH</span> <span class="text-xs font-light text-gray-400">LAB</span>
            </a>
            <p class="text-gray-600 text-xs mt-2">© 2024 ProTech Lab. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script>
        // --- LÓGICA DE INTERFACE (NAVBAR E MENU) ---
        window.addEventListener('scroll', function() {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) {
                nav.classList.add('bg-black/90', 'backdrop-blur-xl', 'py-4', 'border-b', 'border-white/5');
                nav.classList.remove('py-6');
            } else {
                nav.classList.remove('bg-black/90', 'backdrop-blur-xl', 'py-4', 'border-b', 'border-white/5');
                nav.classList.add('py-6');
            }
        });
    
        const menuToggle = document.getElementById('menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuIcon = document.getElementById('menu-icon');
        const mobileLinks = document.querySelectorAll('.mobile-link');
    
        function toggleMenu() {
            const isActive = mobileMenu.classList.toggle('active');
            if (isActive) {
                menuIcon.setAttribute('d', 'M6 18L18 6M6 6l12 12'); 
            } else {
                menuIcon.setAttribute('d', 'M4 6h16M4 12h16m-7 6h7'); 
            }
        }
    
        if (menuToggle) menuToggle.addEventListener('click', toggleMenu);
    
        mobileLinks.forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.classList.remove('active');
                menuIcon.setAttribute('d', 'M4 6h16M4 12h16m-7 6h7');
            });
        });
    
        // Revelar cards de animação
        document.querySelectorAll('.reveal').forEach(el => {
            el.classList.add('active');
        });
    
        // --- LÓGICA DE CADASTRO UNIFICADA ---
        const formSignup = document.querySelector('#form-signup');
    
        formSignup.addEventListener('submit', async (e) => {
            e.preventDefault();
    
            // Captura de valores
            const nome = document.querySelector('#nome').value.trim();
            const email = document.querySelector('#email').value.trim();
            const senha = document.querySelector('#senha').value;
            const confirmarSenha = document.querySelector('#confirmar-senha').value;
            const planoSelecionado = document.getElementById('plano').value;
            const btn = document.getElementById('btn-cadastrar');
    
            // Configuração padrão do SweetAlert2
            const swalConfig = {
                background: '#0c0c0c',
                color: '#fff',
                confirmButtonColor: '#D4AF37'
            };
    
            // Validações de formulário
            if (!planoSelecionado) {
                Swal.fire({ ...swalConfig, title: 'Atenção!', text: 'Selecione um plano para continuar.', icon: 'warning' });
                return;
            }
    
            if (senha !== confirmarSenha) {
                Swal.fire({ ...swalConfig, title: 'Erro!', text: 'As senhas não coincidem.', icon: 'error' });
                return;
            }
    
            if (senha.length < 6) {
                Swal.fire({ ...swalConfig, title: 'Atenção!', text: 'A senha deve ter no mínimo 6 caracteres.', icon: 'warning' });
                return;
            }
    
            // Definição dos limites baseados no plano escolhido
            const limitesPorPlano = {
                'VIP': { stores: 1, items: 10 },
                'PRO': { stores: 3, items: 15 },
                'LEGEND': { stores: 10, items: 30 }
            };
    
            // Objeto final com os dados e limites
            const dadosUsuario = {
                nome,
                email,
                senha,
                plan: planoSelecionado,
                limits: limitesPorPlano[planoSelecionado]
            };
    
            // Estado de carregamento do botão
            btn.disabled = true;
            btn.textContent = 'Cadastrando...';
    
            try {
        // 1. Apenas guardamos os dados temporariamente na sessão
        sessionStorage.setItem('tempSignupData', JSON.stringify(dadosUsuario));

        // 2. Avisamos que a conta foi pré-configurada
        Swal.fire({
            ...swalConfig,
            title: 'Quase lá!',
            text: 'Dados recebidos. Vamos prosseguir para o pagamento do plano.',
            icon: 'info'
        }).then(() => {
            // 3. Redirecionamos para a tela de pagar
            window.location.href = 'checkout.html';
        });

    } catch (err) {
        Swal.fire({ 
            ...swalConfig, 
            title: 'Erro!', 
            text: 'Ocorreu um erro ao processar seus dados.', 
            icon: 'error' 
        });
    } finally {
        btn.disabled = false;
        btn.textContent = 'Cadastrar';
    }
        });
    </script>
</body>
</html>
