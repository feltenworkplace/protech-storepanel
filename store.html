<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store | ProTech Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .drawer-overlay { transition: opacity 0.3s ease; pointer-events: none; opacity: 0; }
        .drawer-overlay.active { opacity: 1; pointer-events: auto; }

        .group .overflow-hidden {
    -webkit-backface-visibility: hidden; /* Força aceleração de hardware no Safari/Chrome */
    backface-visibility: hidden;
    transform: translateZ(0); /* "Finta" o navegador para renderizar em 3D */
}
    </style>
</head>
<body class="bg-white text-black antialiased overflow-x-hidden">

    <div id="category-overlay" onclick="toggleCategoryMenu(false)" class="drawer-overlay fixed inset-0 bg-black/60 backdrop-blur-sm z-[100]"></div>

    <aside id="category-drawer" class="fixed top-0 left-0 h-full w-72 bg-white z-[110] transform -translate-x-full transition-transform duration-300 shadow-2xl border-r border-gray-100">
        <div class="p-8">
            <div class="flex items-center justify-between mb-10">
                <h2 class="text-xs font-black uppercase tracking-[0.2em] text-gray-400">Categorias</h2>
                <button onclick="toggleCategoryMenu(false)" class="text-gray-400 hover:text-black transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <nav id="category-list" class="space-y-2">
                <p class="text-xs text-gray-400 italic">Nenhuma categoria cadastrada.</p>
            </nav>
        </div>
    </aside>

    <header id="main-header" class="w-full absolute top-0 z-50 bg-transparent">
        <div class="w-full px-6 h-24 flex items-center justify-between relative">
            
            <div class="flex items-center gap-4 z-10">
                <div class="w-14 h-14 bg-white/10 backdrop-blur-md rounded-xl flex items-center justify-center overflow-hidden border border-white/20 shrink-0">
                    <img id="header-logo-img" src="https://via.placeholder.com/150" alt="Logo" class="w-full h-full object-contain p-1">
                </div>
                <button onclick="toggleCategoryMenu(true)" class="px-6 py-2.5 border border-white rounded-full text-[12px] font-black uppercase tracking-widest text-white hover:bg-white hover:text-black transition whitespace-nowrap">
                    Catálogo
                </button>
            </div>
    
            <div class="flex items-center justify-end z-10">
                <div onclick="toggleCart(true)" class="relative cursor-pointer group p-2 text-white bg-white/10 backdrop-blur-md rounded-full border border-white/20">
                    <svg class="w-8 h-8 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                    </svg>
                    <span id="cart-count" class="absolute top-1 right-0 bg-black text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center border-2 border-white">0</span>
                </div>
            </div>
        </div>
    </header>
    
    <div id="store-banner-container" class="w-full h-[150px] md:h-[220px] relative hidden overflow-visible mb-16">
        <img id="store-banner-img" src="" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-b from-black/40 to-transparent"></div>
    
        <div class="absolute top-full left-1/2 -translate-x-1/2 -translate-y-1/2 z-30">
            <h1 id="store-logo" class="px-10 py-4 bg-white/90 backdrop-blur-xl rounded-2xl border border-gray-100 text-2xl font-black tracking-tighter text-black whitespace-nowrap shadow-xl">
                Carregando...
            </h1>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-6 py-24 text-center">
        <p id="empty-message" class="text-gray-400 text-sm font-medium">Nenhum produto encontrado</p>
        <h2 id="current-cat-display" class="text-2xl font-black uppercase tracking-tighter text-center mb-12 hidden">
        </h2>
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-4 gap-8 mt-12"></div>
    </main>

<div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full sm:w-[400px] bg-[#050505] border-l border-white/10 z-[100] transform translate-x-full transition-transform duration-300">
    <div class="h-full flex flex-col p-6">
        <div class="flex justify-between items-center mb-8">
            <h3 class="text-xl font-bold uppercase tracking-tighter text-white">Seu Carrinho</h3>
            <button onclick="toggleCart(false)" class="text-gray-500 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>

        <div id="cart-items" class="flex-grow overflow-y-auto space-y-4 custom-scrollbar">
            </div>

        <div class="border-t border-white/5 pt-6 mt-6">
            <div class="flex justify-between mb-6">
                <span class="text-gray-400 font-medium">Subtotal:</span>
                <span id="cart-subtotal" class="text-white font-bold text-lg">R$ 0,00</span>
            </div>
            <button onclick="goToCheckout()" class="w-full py-4 border border-white text-white font-bold uppercase hover:bg-white hover:text-black transition duration-300">
                Ir para o Checkout
            </button>
        </div>
    </div>
</div>
<div id="cart-overlay" onclick="toggleCart(false)" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[90] hidden opacity-0 transition-opacity duration-300"></div>

<div id="toast-container" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[200] space-y-2 pointer-events-none"></div>
<script src="cart.js"></script>
    <script>
        const STORAGE_KEYS = { stores: 'protech_stores_v1' };
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('s');
    
        function toggleCategoryMenu(show) {
            const drawer = document.getElementById('category-drawer');
            const overlay = document.getElementById('category-overlay');
            if (show) {
                drawer.classList.remove('-translate-x-full');
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            } else {
                drawer.classList.add('-translate-x-full');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            }
        }
    
function renderProductCard(prod) {
    const isNew = (Date.now() - Number(prod.id)) < (24 * 60 * 60 * 1000);
    const badgeHtml = isNew ? `
        <div class="absolute top-4 right-4 bg-white/90 backdrop-blur-md px-3 py-1 rounded-full border border-gray-100 shadow-sm z-10">
            <span class="text-[10px] font-black uppercase tracking-widest text-black">Novo</span>
        </div>` : '';

    return `
        <div class="bg-white p-6 rounded-[2.5rem] border border-gray-100 hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 group text-left">
            <div class="aspect-square bg-gray-50 rounded-[2rem] mb-6 overflow-hidden border border-gray-50 relative p-6">
                <img src="${prod.image}" class="w-full h-full object-contain group-hover:scale-110 transition-transform duration-700 ease-out" onerror="this.src='https://via.placeholder.com/400'">
                ${badgeHtml}
            </div>
            <div class="px-2">
                <h3 class="text-lg font-black text-black mb-1 tracking-tight">${prod.name}</h3>
                <p class="text-gray-400 text-[10px] font-bold uppercase tracking-[0.2em] mb-6">Em Estoque</p>
                <div class="flex items-center gap-2 mt-6">
                    <button onclick="addToCart('${prod.id}')" class="flex-grow py-4 bg-[#D4AF37] text-black rounded-2xl flex items-center justify-center hover:bg-black hover:text-[#D4AF37] transition-all duration-300 shadow-lg shadow-[#D4AF37]/20 active:scale-[0.97]">
                        <span class="text-sm font-black tracking-tighter">R$ ${prod.price}</span>
                    </button>
                    <button class="w-14 h-14 shrink-0 border border-gray-100 bg-gray-50/50 rounded-2xl text-black flex items-center justify-center hover:bg-black hover:text-white transition-all font-black text-lg">...</button>
                </div>
            </div>
        </div>`;
}
    
        function loadStoreData() {
            const stores = JSON.parse(localStorage.getItem(STORAGE_KEYS.stores) || '[]');
            const store = stores.find(s => s.slug === slug);
            if (!store) {
                document.body.innerHTML = "<div class='h-screen flex items-center justify-center font-bold'>Loja não encontrada.</div>";
                return;
            }
    
            document.title = `${store.name} | ProTech Lab`;
            if (document.getElementById('store-logo')) document.getElementById('store-logo').innerText = store.name;
    
            // Categorias
            const categoryList = document.getElementById('category-list');
            const activeCategories = (store.categories || []).filter(cat => cat.status === 'Ativo');
            if (activeCategories.length > 0) {
                categoryList.innerHTML = activeCategories.map(cat => {
                    const count = (store.products || []).filter(p => p.categoryId === cat.id).length;
                    return `<a href="javascript:void(0)" onclick="filterByStoreCategory('${cat.id}')" class="flex items-center justify-between px-4 py-3 rounded-xl text-sm font-bold text-gray-600 hover:bg-gray-50 hover:text-black transition-all group">
                            <span>${cat.nome}</span><span class="text-[10px] text-gray-400 font-medium group-hover:text-black">(${count})</span></a>`;
                }).join('');
            }
    
            // Produtos
            const productGrid = document.getElementById('product-grid');
            const emptyMessage = document.getElementById('empty-message');
            const products = store.products || [];
            if (products.length > 0) {
                if (emptyMessage) emptyMessage.classList.add('hidden');
                productGrid.innerHTML = products.map(prod => renderProductCard(prod)).join('');
            } else {
                if (emptyMessage) emptyMessage.classList.remove('hidden');
                productGrid.innerHTML = '';
            }
    
            // Settings (Banner, Logo, etc)
            if (store.settings) {
                if (store.settings.logo) document.getElementById('header-logo-img').src = store.settings.logo;
                if (store.settings.banner) {
                    document.getElementById('store-banner-img').src = store.settings.banner;
                    document.getElementById('store-banner-container').classList.remove('hidden');
                }
                if (store.settings.customCss) {
                    const style = document.createElement('style');
                    style.textContent = store.settings.customCss;
                    document.head.appendChild(style);
                }
            }
        }
    
        function filterByStoreCategory(categoryId) {
    const stores = JSON.parse(localStorage.getItem(STORAGE_KEYS.stores) || '[]');
    const store = stores.find(s => s.slug === slug);
    if (!store) return;

    // Encontra o nome da categoria
    const category = store.categories.find(c => c.id === categoryId);
    const titleDisplay = document.getElementById('current-cat-display');

    if (category && titleDisplay) {
        titleDisplay.innerText = category.nome;
        titleDisplay.classList.remove('hidden'); // Mostra o título
    }

    const filtered = (store.products || []).filter(p => p.categoryId === categoryId);
    const grid = document.getElementById('product-grid');
    grid.innerHTML = filtered.length > 0 ? filtered.map(p => renderProductCard(p)).join('') : '';
    
    toggleCategoryMenu(false);
}
    
        window.addEventListener('scroll', () => {
            const header = document.getElementById('main-header');
            if (window.scrollY > 80) { header.classList.add('bg-white', 'shadow-md'); header.classList.remove('bg-transparent'); }
            else { header.classList.remove('bg-white', 'shadow-md'); header.classList.add('bg-transparent'); }
        });
    
        document.addEventListener('DOMContentLoaded', loadStoreData);

function showToast(productName) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = "bg-black text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 animate-bounce shadow-emerald-500/20 border border-emerald-500/30";
    toast.innerHTML = `
        <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
        <span class="text-xs font-black uppercase tracking-widest">${productName} adicionado!</span>
    `;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(20px)';
        toast.style.transition = 'all 0.5s ease';
        setTimeout(() => toast.remove(), 500);
    }, 2500);
}
    </script>
</body>
</html>
