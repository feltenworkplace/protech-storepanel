<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Dark | ProTech Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; }
        
        /* Efeito de Vidro Fumê para Cards */
        .glass-dark {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Scroll customizado para as categorias estilo Stories */
        .stories-scroll::-webkit-scrollbar { display: none; }
        .stories-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        .product-card:hover {
            border-color: rgba(212, 175, 55, 0.4);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
        }

        /* Animação suave de entrada */
        .reveal { animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased overflow-x-hidden">

    <header class="fixed top-0 w-full z-50 bg-[#050505] border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between relative">
            
            <div class="flex items-center gap-5">
                <img id="header-logo-img" src="" class="w-12 h-12 object-contain rounded-2xl border border-white/10 p-1.5 bg-black hidden shadow-lg shadow-black/50">
                <button onclick="toggleCart(true)" class="p-2.5 bg-white/5 rounded-xl border border-white/10 hover:bg-white/10 transition">
                    <svg class="w-6 h-6 text-[#D4AF37]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
    
            <div class="absolute left-1/2 -translate-x-1/2">
                <span id="store-name-header" class="font-black tracking-tighter text-xl uppercase text-white whitespace-nowrap drop-shadow-md">
                    ProTech
                </span>
            </div>
            
            <div class="flex items-center">
                <div onclick="toggleCart(true)" class="relative cursor-pointer p-3 bg-white/5 rounded-full border border-white/10 hover:bg-white/10 transition">
                    <svg class="w-7 h-7 text-[#D4AF37]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                    </svg>
                    <span id="cart-count" class="absolute top-1 right-0 bg-[#D4AF37] text-black text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-black">0</span>
                </div>
            </div>
    
        </div>
    </header>

    <div id="store-banner-container" class="w-full h-[250px] relative mt-20 hidden">
        <img id="store-banner-img" src="" class="w-full h-full object-cover">
    </div>

    <main class="max-w-7xl mx-auto px-6 py-12 mt-10">
        <h2 id="current-cat-name" class="font-black text-2xl uppercase tracking-tighter text-white mb-10 hidden"></h2>
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            </div>
        <p id="empty-message" class="text-center text-gray-600 py-20 hidden font-bold uppercase tracking-widest text-xs">Nenhum item disponível</p>
    </main>

    <aside id="cat-drawer" class="fixed top-0 left-0 w-full max-w-sm h-screen bg-[#080808] z-[100] transform -translate-x-full transition-transform duration-300 border-r border-white/5 flex flex-col">
        <div class="p-6 border-b border-white/5 flex items-center justify-between">
            <h2 class="font-black uppercase tracking-widest text-sm text-white">Catálogo</h2>
            <button onclick="toggleCatDrawer(false)" class="text-gray-500 hover:text-white transition">Fechar</button>
        </div>
        <div id="cat-list" class="flex-grow overflow-y-auto p-6 space-y-4">
            </div>
    </aside>

    <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full sm:w-[400px] bg-[#050505] border-l border-white/10 z-[110] transform translate-x-full transition-transform duration-300">
        <div class="h-full flex flex-col p-8">
            <div class="flex justify-between items-center mb-10">
                <h3 class="text-xl font-black uppercase tracking-tighter text-white italic">Seu Carrinho</h3>
                <button onclick="toggleCart(false)" class="text-gray-500 hover:text-white transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
    
            <div id="cart-items" class="flex-grow overflow-y-auto space-y-6 custom-scrollbar">
                </div>
    
            <div class="border-t border-white/5 pt-8 mt-6">
                <div class="flex justify-between mb-8">
                    <span class="text-gray-500 text-[10px] font-black uppercase tracking-widest">Subtotal:</span>
                    <span id="cart-subtotal" class="text-white font-black text-xl font-mono">R$ 0,00</span>
                </div>
                <button onclick="goToCheckout()" class="w-full py-5 border border-white/20 text-white text-xs font-black uppercase tracking-[0.2em] hover:bg-white hover:text-black transition duration-500 rounded-2xl">
                    Ir para o Checkout
                </button>
            </div>
        </div>
    </div>
    
    <div id="cart-overlay" onclick="toggleCart(false)" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] hidden opacity-0 transition-opacity duration-300"></div>

<div id="product-details-modal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeProductDetails()"></div>
    
    <div class="relative w-full max-w-3xl bg-[#0b0b0b] border border-white/10 rounded-[2.5rem] overflow-hidden shadow-2xl shadow-black flex flex-col md:flex-row max-h-[90vh]">
        
        <button onclick="closeProductDetails()" class="absolute top-6 right-6 z-10 w-10 h-10 bg-white/5 rounded-full flex items-center justify-center text-white hover:bg-white hover:text-black transition-all border border-white/10">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>

        <div class="w-full md:w-5/12 bg-black p-8 flex items-center justify-center border-b md:border-b-0 md:border-r border-white/5 min-h-[250px] shrink-0">
            <img id="modal-prod-img" src="" class="w-full h-auto max-h-[300px] object-contain hover:scale-105 transition-transform duration-500">
        </div>

        <div class="w-full md:w-7/12 p-8 md:p-10 flex flex-col bg-[#0b0b0b] overflow-y-auto custom-scrollbar">
            <h3 id="modal-prod-name" class="text-3xl font-black text-white mb-6 tracking-tight leading-tight">Nome do Produto</h3>
            
            <h4 class="text-[10px] font-black text-[#D4AF37] uppercase tracking-[0.2em] mb-3">Detalhes do Produto</h4>
            
            <p id="modal-prod-desc" class="text-sm text-gray-400 leading-relaxed whitespace-pre-wrap break-words overflow-wrap-anywhere">
                Nenhuma descrição disponível.
            </p>
        </div>
    </div>
</div>

<div id="product-details-modal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeProductDetails()"></div>
    
    <div class="relative w-full max-w-3xl bg-[#0b0b0b] border border-white/10 rounded-[2.5rem] overflow-hidden shadow-2xl shadow-black flex flex-col md:flex-row max-h-[90vh]">
        <button onclick="closeProductDetails()" class="absolute top-6 right-6 z-10 w-10 h-10 bg-white/5 rounded-full flex items-center justify-center text-white hover:bg-white hover:text-black transition-all border border-white/10">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>

        <div class="w-full md:w-5/12 bg-black p-8 flex items-center justify-center border-b md:border-b-0 md:border-r border-white/5 min-h-[250px] shrink-0">
            <img id="modal-prod-img" src="" class="w-full h-auto max-h-[300px] object-contain hover:scale-105 transition-transform duration-500">
        </div>

        <div class="w-full md:w-7/12 p-8 md:p-10 flex flex-col bg-[#0b0b0b] overflow-y-auto custom-scrollbar">
            <h3 id="modal-prod-name" class="text-3xl font-black text-white mb-6 tracking-tight leading-tight">Nome do Produto</h3>
            <h4 class="text-[10px] font-black text-[#D4AF37] uppercase tracking-[0.2em] mb-3">Detalhes do Produto</h4>
            <p id="modal-prod-desc" class="text-sm text-gray-400 leading-relaxed whitespace-pre-wrap break-words overflow-wrap-anywhere">
                Nenhuma descrição disponível.
            </p>
        </div>
    </div>
</div>

    <script src="cart.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('s');
    window.currentStore = null;

    async function loadStore() {
        if (!slug) return document.body.innerHTML = "Loja não encontrada.";

        try {
            const response = await fetch(`https://storepanel-backend.onrender.com/api/store/${slug}`);
            const data = await response.json();

            if (!data.success) return document.body.innerHTML = "Loja não encontrada.";

            const store = data.store;
            window.currentStore = store;

            document.title = `${store.name} | ProTech Lab`;

            // Logo e Nome
            if (document.getElementById('store-name-header')) document.getElementById('store-name-header').innerText = store.name;
            if (store.settings?.logo) {
                const logoImg = document.getElementById('header-logo-img');
                logoImg.src = store.settings.logo;
                logoImg.classList.remove('hidden');
            }

            // Banner (Sem o Fading no Gradiente)
            if (store.settings?.banner) {
                document.getElementById('store-banner-img').src = store.settings.banner;
                document.getElementById('store-banner-container').classList.remove('hidden');
            }

            // Favicon Dinâmico
            if (store.settings?.favicon) {
                let link = document.querySelector("link[rel~='icon']");
                if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
                link.href = store.settings.favicon;
            }

            // Categorias no Drawer (Lista, igual Template 1)
            const catList = document.getElementById('cat-list');
            if (catList) {
                const activeCats = (store.categories || []).filter(c => c.status === 'Ativo');
                
                let catHTML = `<button onclick="renderAllProducts('${store.slug}')" class="w-full text-left py-2 px-4 rounded-lg bg-white/5 border border-white/10 hover:bg-[#D4AF37] hover:text-black transition text-xs font-bold uppercase text-white">Ver Tudo</button>`;
                
                catHTML += activeCats.map(cat => `
                    <button onclick="filterByCat('${store.slug}', '${cat.id}', '${cat.nome}')" class="w-full text-left py-2 px-4 rounded-lg bg-black hover:bg-zinc-900 border border-white/5 transition text-xs font-medium uppercase text-gray-300">
                        ${cat.nome}
                    </button>
                `).join('');
                
                catList.innerHTML = catHTML;
            }

            renderProducts(store.products || []); // Mostra todos inicialmente

        } catch (error) {
            console.error("Erro ao carregar loja Dark:", error);
            document.body.innerHTML = "Erro de conexão.";
        }
    }

    function renderProducts(products) {
        const grid = document.getElementById('product-grid');
        const msg = document.getElementById('empty-message');
        
        const activeProducts = products.filter(p => p.status === 'Ativo');

        if (activeProducts.length === 0) { grid.innerHTML = ''; msg.classList.remove('hidden'); return; }
        msg.classList.add('hidden');

        grid.innerHTML = activeProducts.map(prod => `
            <div class="product-card glass-dark rounded-[2rem] p-5 transition-all duration-300 flex flex-col h-full">
                <div class="aspect-square rounded-2xl overflow-hidden mb-4 bg-black border border-white/5 p-4 shrink-0">
                    <img src="${prod.image}" class="w-full h-full object-contain">
                </div>
                <div class="flex-grow">
                    <h3 class="font-black text-sm uppercase tracking-tight text-white">${prod.name}</h3>
                    <p class="text-[#D4AF37] font-black text-lg mt-2">R$ ${prod.price}</p>
                </div>
                
                <div class="flex items-center gap-2 mt-4 shrink-0">
                    <button onclick="addToCart('${prod.id}')" class="flex-grow py-3 h-[42px] bg-white/5 border border-white/10 rounded-xl text-[10px] font-black uppercase text-white hover:bg-[#D4AF37] hover:text-black transition">Adicionar</button>
                    <button onclick="openProductDetails('${prod.id}')" class="w-[42px] h-[42px] shrink-0 bg-white/5 border border-white/10 rounded-xl flex items-center justify-center text-white hover:bg-white hover:text-black transition font-black text-lg pb-1" title="Ver Detalhes">...</button>
                </div>
            </div>
        `).join('');
    }

    function filterByCat(slug, categoryId, categoryName) {
        const store = window.currentStore;
        if (!store) return;

        const filtered = (store.products || []).filter(p => p.categoryId === categoryId);
        renderProducts(filtered);
        
        const titleCat = document.getElementById('current-cat-name');
        titleCat.innerText = categoryName;
        titleCat.classList.remove('hidden');

        toggleCatDrawer(false); 
    }

    function renderAllProducts(slug) {
        const store = window.currentStore;
        if (!store) return;
        
        renderProducts(store.products || []);
        document.getElementById('current-cat-name').classList.add('hidden');
        toggleCatDrawer(false);
    }

    function toggleCatDrawer(show) {
        document.getElementById('cat-drawer').classList.toggle('-translate-x-full', !show);
    }

    function openProductDetails(productId) {
        const store = window.currentStore;
        if (!store) return;

        const product = (store.products || []).find(p => p.id === productId);
        if (!product) return;

        document.getElementById('modal-prod-img').src = product.image;
        document.getElementById('modal-prod-name').textContent = product.name;
        
        const descElement = document.getElementById('modal-prod-desc');
        if (product.description && product.description.trim() !== '') {
            descElement.textContent = product.description;
        } else {
            descElement.textContent = "Nenhuma descrição detalhada disponível para este item.";
        }

        document.getElementById('product-details-modal').classList.remove('hidden');
        document.body.classList.add('overflow-hidden');
    }

    function closeProductDetails() {
        document.getElementById('product-details-modal').classList.add('hidden');
        document.body.classList.remove('overflow-hidden');
    }

    document.addEventListener('DOMContentLoaded', loadStore);
</script>
</body>
</html>
