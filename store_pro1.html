<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store PRO | ProTech Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        
        /* Estilo Stories */
        .stories-container::-webkit-scrollbar { display: none; }
        .story-ring {
            padding: 3px;
            background: linear-gradient(45deg, #D4AF37, #f3e5ab, #D4AF37);
            border-radius: 50%;
            transition: transform 0.3s ease;
        }
        .story-ring:active { transform: scale(0.9); }

        /* Card de Produto PRO */
        .pro-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 2.5rem;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .pro-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: #D4AF37;
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 20px rgba(212, 175, 55, 0.1);
        }

        /* Badge flutuante */
        .glass-badge {
            background: rgba(212, 175, 55, 0.2);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body class="antialiased">

    <header class="fixed top-0 w-full z-50 bg-black/60 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <img id="header-logo-img" src="" class="w-12 h-12 object-contain rounded-xl border border-white/10 p-1 bg-zinc-900 shadow-2xl">
            
            <div class="absolute left-1/2 -translate-x-1/2">
                <span id="store-name-header" class="font-black tracking-tighter text-xl uppercase italic text-[#D4AF37]">PROtech</span>
            </div>

            <button onclick="toggleCart(true)" class="relative p-3 bg-zinc-900 rounded-2xl border border-white/5 hover:border-[#D4AF37]/50 transition-all">
                <svg class="w-6 h-6 text-[#D4AF37]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-[#D4AF37] text-black text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-black">0</span>
            </button>
        </div>
    </header>

    <div id="store-banner-container" class="w-full h-[350px] relative overflow-hidden mt-20 hidden">
        <img id="store-banner-img" src="" class="w-full h-full object-cover scale-110 blur-[2px] opacity-40">
        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent"></div>
        <div class="absolute inset-0 flex flex-col items-center justify-center text-center px-6">
            <h1 id="banner-store-name" class="text-5xl md:text-7xl font-black uppercase tracking-tighter mb-4">Loja Exemplo</h1>
        </div>
    </div>

    <section class="max-w-7xl mx-auto px-6 -mt-12 relative z-10">
        <div id="category-stories" class="flex gap-6 overflow-x-auto stories-container py-4 no-scrollbar">
            </div>
    </section>

    <main class="max-w-7xl mx-auto px-6 py-16">
        <div class="flex items-center justify-between mb-12">
            <h2 id="current-cat-display" class="text-3xl font-black uppercase tracking-tighter">Coleção Completa</h2>
            <div class="h-px flex-grow bg-white/5 ml-8 hidden md:block"></div>
        </div>

        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10">
            </div>
    </main>
    <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full sm:w-[400px] bg-[#050505] border-l border-white/10 z-[110] transform translate-x-full transition-transform duration-300">
        <div class="h-full flex flex-col p-8">
            <div class="flex justify-between items-center mb-10">
                <h3 class="text-xl font-black uppercase tracking-tighter text-white italic">Seu Carrinho</h3>
                <button onclick="toggleCart(false)" class="text-gray-500 hover:text-white transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
    
            <div id="cart-items" class="flex-grow overflow-y-auto space-y-6 custom-scrollbar">
                </div>
    
            <div class="border-t border-white/5 pt-8 mt-6">
                <div class="flex justify-between mb-8">
                    <span class="text-gray-500 text-[10px] font-black uppercase tracking-widest">Subtotal:</span>
                    <span id="cart-subtotal" class="text-white font-black text-xl font-mono">R$ 0,00</span>
                </div>
                <button onclick="goToCheckout()" class="w-full py-5 border border-white/20 text-white text-xs font-black uppercase tracking-[0.2em] hover:bg-white hover:text-black transition duration-500 rounded-2xl">
                    Ir para o Checkout
                </button>
            </div>
        </div>
    </div>
    
    <div id="cart-overlay" onclick="toggleCart(false)" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] hidden opacity-0 transition-opacity duration-300"></div>
    
    <div id="product-details-modal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/90 backdrop-blur-md" onclick="closeProductDetails()"></div>
    
    <div class="relative w-full max-w-4xl pro-card overflow-hidden shadow-[0_0_50px_rgba(212,175,55,0.05)] flex flex-col md:flex-row max-h-[90vh]">
        
        <button onclick="closeProductDetails()" class="absolute top-6 right-6 z-10 w-10 h-10 bg-white/10 rounded-full flex items-center justify-center text-white hover:bg-[#D4AF37] hover:text-black transition-all border border-white/10">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>

        <div class="w-full md:w-1/2 bg-zinc-900/40 p-10 flex flex-col items-center justify-center border-b md:border-b-0 md:border-r border-white/5 relative min-h-[300px] shrink-0">
            <img id="modal-prod-img" src="" class="w-full h-auto max-h-[400px] object-contain drop-shadow-[0_20px_50px_rgba(212,175,55,0.15)] hover:scale-105 transition-transform duration-700">
        </div>

        <div class="w-full md:w-1/2 p-10 flex flex-col bg-black/20 overflow-y-auto custom-scrollbar">
            <h3 id="modal-prod-name" class="text-3xl md:text-4xl font-black text-white mb-6 tracking-tighter uppercase leading-tight">Nome do Produto</h3>
            
            <div class="h-px w-16 bg-[#D4AF37] mb-8"></div>
            
            <h4 class="text-[10px] font-black text-gray-500 uppercase tracking-[0.3em] mb-4">Sobre a Edição</h4>
            
            <p id="modal-prod-desc" class="text-sm text-gray-300 leading-relaxed whitespace-pre-wrap break-words overflow-wrap-anywhere">
                Nenhuma descrição disponível.
            </p>
        </div>
    </div>
</div>
    <script src="cart.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('s');
        window.currentStore = null;

        async function loadStore() {
            if (!slug) {
                document.body.innerHTML = "<div class='h-screen flex items-center justify-center font-black uppercase tracking-widest text-gray-500'>URL Inválida</div>";
                return;
            }

            try {
                const response = await fetch(`https://storepanel-backend.onrender.com/api/store/${slug}`);
                const data = await response.json();

                if (!data.success) {
                    document.body.innerHTML = `
                        <div class='h-screen flex flex-col items-center justify-center bg-black text-white p-10 text-center'>
                            <h1 class='text-6xl font-black text-[#D4AF37] mb-4'>404</h1>
                            <p class='font-bold uppercase tracking-[0.3em] text-xs text-gray-500'>Instância não localizada no ProTech Lab</p>
                            <a href='dashboard.html' class='mt-8 px-8 py-3 bg-white/5 border border-white/10 rounded-full text-[10px] font-black uppercase hover:bg-[#D4AF37] hover:text-black transition-all'>Voltar ao Painel</a>
                        </div>`;
                    return;
                }

                const store = data.store;
                window.currentStore = store;

                document.title = `${store.name} | ProTech Lab`;
                document.getElementById('banner-store-name').innerText = store.name;
                document.getElementById('store-name-header').innerText = store.name;

                if (store.settings?.logo) document.getElementById('header-logo-img').src = store.settings.logo;
                if (store.settings?.banner) {
                    document.getElementById('store-banner-img').src = store.settings.banner;
                    document.getElementById('store-banner-container').classList.remove('hidden');
                }

                // Render Categorias em Stories
                const catContainer = document.getElementById('category-stories');
                const activeCats = (store.categories || []).filter(c => c.status === 'Ativo');
                
                catContainer.innerHTML = `
                    <div onclick="resetFilter()" class="flex-shrink-0 cursor-pointer text-center group">
                        <div class="story-ring w-20 h-20 mb-2 group-hover:rotate-12">
                            <div class="w-full h-full bg-zinc-900 rounded-full border-2 border-black flex items-center justify-center font-black text-[10px] uppercase text-[#D4AF37]">Tudo</div>
                        </div>
                        <p class="text-[10px] font-black uppercase text-gray-500 group-hover:text-white transition">Início</p>
                    </div>
                ` + activeCats.map(cat => `
                    <div onclick="filterByCat('${cat.id}', '${cat.nome}')" class="flex-shrink-0 cursor-pointer text-center group">
                        <div class="story-ring w-20 h-20 mb-2 group-hover:rotate-12 transition-all">
                            <div class="w-full h-full bg-zinc-800 rounded-full border-2 border-black flex items-center justify-center font-black text-xs uppercase text-[#D4AF37]">${cat.nome.substring(0,2)}</div>
                        </div>
                        <p class="text-[10px] font-black uppercase text-gray-500 group-hover:text-white transition">${cat.nome}</p>
                    </div>
                `).join('');

                renderProducts(store.products || []);

            } catch (error) {
                console.error("Erro ao carregar loja PRO:", error);
                 document.body.innerHTML = "<div class='h-screen flex items-center justify-center font-bold'>Erro de conexão com o servidor.</div>";
            }
        }

        function resetFilter() {
            document.getElementById('current-cat-display').innerText = "Tudo";
            renderProducts();
        }

        function renderProducts(productsToRender) {
            const store = window.currentStore;
            if (!store) return;
            const products = productsToRender || store.products || [];
            const activeProducts = products.filter(p => p.status === 'Ativo');
            
            const grid = document.getElementById('product-grid');
            grid.innerHTML = activeProducts.map(prod => `
                <div class="pro-card p-6 flex flex-col h-full">
                    <div class="relative aspect-[4/5] rounded-[2rem] overflow-hidden mb-6 bg-zinc-900 border border-white/5 p-4">
                        <img src="${prod.image}" class="w-full h-full object-contain">
                        <div class="glass-badge absolute top-4 right-4 px-3 py-1 rounded-full text-[8px] font-black uppercase tracking-widest text-[#D4AF37]">Premium</div>
                    </div>
                    <h3 class="font-black text-lg uppercase tracking-tight mb-2 flex-grow">${prod.name}</h3>
                    <div class="flex items-center justify-between mt-4">
                        <div class="flex flex-col">
                            <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest leading-none">Preço</span>
                            <span class="text-xl font-black text-[#D4AF37]">R$ ${prod.price}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="openProductDetails('${prod.id}')" class="w-12 h-12 bg-zinc-900 border border-white/10 text-white rounded-2xl flex items-center justify-center hover:bg-white hover:text-black transition-all transform active:scale-90 font-black text-xl pb-2" title="Ver Detalhes">...</button>
                            <button onclick="addToCart('${prod.id}')" class="w-12 h-12 bg-white text-black rounded-2xl flex items-center justify-center hover:bg-[#D4AF37] transition-all transform active:scale-90" title="Adicionar">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterByCat(id, name) {
            const store = window.currentStore;
            if(!store) return;
            const filtered = store.products.filter(p => p.categoryId === id);
            document.getElementById('current-cat-display').innerText = name;
            renderProducts(filtered);
        }

        function openProductDetails(productId) {
            const store = window.currentStore;
            if (!store) return;

            const product = (store.products || []).find(p => p.id === productId);
            if (!product) return;

            document.getElementById('modal-prod-img').src = product.image;
            document.getElementById('modal-prod-name').textContent = product.name;
            
            const descElement = document.getElementById('modal-prod-desc');
            if (product.description && product.description.trim() !== '') {
                descElement.textContent = product.description;
            } else {
                descElement.textContent = "Edição exclusiva sem descrição detalhada. Item de coleção premium.";
            }

            document.getElementById('product-details-modal').classList.remove('hidden');
            document.body.classList.add('overflow-hidden');
        }

        function closeProductDetails() {
            document.getElementById('product-details-modal').classList.add('hidden');
            document.body.classList.remove('overflow-hidden');
        }

        document.addEventListener('DOMContentLoaded', loadStore);
    </script>
</body>
</html>
